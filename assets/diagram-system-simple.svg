<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="brokerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A5EEA"/>
      <stop offset="1" stop-color="#3F37B5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b9b9cc"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="958" height="298" rx="18" fill="#ffffff" stroke="#e5e5ef"/>

  <!-- edges -->
  <path d="M170 107 H230" fill="none" stroke="#b9b9cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="98" text-anchor="middle" fill="#6b6b80" font-size="11">stdio</text>
  <path d="M410 107 H470" fill="none" stroke="#b9b9cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="98" text-anchor="middle" fill="#6b6b80" font-size="11">ws :8765</text>
  <path d="M610 107 H670" fill="none" stroke="#b9b9cc" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790 107 H850" fill="none" stroke="#b9b9cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- shared DB connector -->
  <path d="M320 136 V196" fill="none" stroke="#b9b9cc" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="332" y="172" text-anchor="start" fill="#6b6b80" font-size="11">shared</text>

  <!-- SQLite cylinder -->
  <path d="M245 205 L245 255 A75 11 0 0 0 395 255 L395 205" fill="rgba(90,94,234,0.10)" stroke="#5A5EEA" stroke-width="1.5"/>
  <ellipse cx="320" cy="205" rx="75" ry="11" fill="rgba(90,94,234,0.16)" stroke="#5A5EEA" stroke-width="1.5"/>
  <text x="320" y="232" text-anchor="middle" fill="#16161d" font-size="15" font-weight="600">SQLite library</text>
  <text x="320" y="249" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">library.db · WAL</text>

  <!-- AI agent (stacked = many sessions) -->
  <rect x="42" y="90" width="128" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5" opacity="0.5"/>
  <rect x="36" y="84" width="128" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5" opacity="0.75"/>
  <rect x="30" y="78" width="128" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  <text x="94" y="100" text-anchor="middle" fill="#16161d" font-size="15" font-weight="600">AI agent</text>
  <text x="94" y="117" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">MCP client</text>
  <text x="97" y="165" text-anchor="middle" fill="#6b6b80" font-size="11">one per session</text>

  <!-- MCP server -->
  <rect x="230" y="79" width="180" height="56" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  <text x="320" y="102" text-anchor="middle" fill="#16161d" font-size="15" font-weight="600">playback-mcp</text>
  <text x="320" y="119" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">MCP server</text>

  <!-- broker -->
  <rect x="470" y="79" width="140" height="56" rx="13" fill="url(#brokerGrad)"/>
  <text x="540" y="102" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">broker</text>
  <text x="540" y="120" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="11" font-family="ui-monospace, Menlo, monospace">127.0.0.1:8765</text>

  <!-- extension -->
  <rect x="670" y="79" width="120" height="56" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  <text x="730" y="102" text-anchor="middle" fill="#16161d" font-size="15" font-weight="600">extension</text>
  <text x="730" y="119" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">Chrome</text>

  <!-- browser tab (stacked = one per session) -->
  <rect x="862" y="90" width="96" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5" opacity="0.5"/>
  <rect x="856" y="84" width="96" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5" opacity="0.75"/>
  <rect x="850" y="78" width="96" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  <text x="898" y="100" text-anchor="middle" fill="#16161d" font-size="15" font-weight="600">browser tab</text>
  <text x="898" y="117" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">&lt;video&gt;</text>
  <circle cx="898" cy="128" r="4" fill="#FF5A52"/>
  <text x="901" y="165" text-anchor="middle" fill="#6b6b80" font-size="11">one per session</text>
</svg>
