<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 580" width="1040" height="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="brokerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A5EEA"/>
      <stop offset="1" stop-color="#3F37B5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b9b9cc"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1038" height="578" rx="18" fill="#ffffff" stroke="#e5e5ef"/>

  <!-- column headers -->
  <g fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="115" y="42">CLIENTS</text>
    <text x="390" y="42">MCP SERVERS</text>
    <text x="646" y="42">BROKER</text>
    <text x="840" y="42">EXTENSION</text>
    <text x="975" y="42">TABS</text>
  </g>

  <!-- edges: client -> server -->
  <g fill="none" stroke="#b9b9cc" stroke-width="2">
    <path d="M170 96 H300" marker-end="url(#arrow)"/>
    <path d="M170 216 H300" marker-end="url(#arrow)"/>
    <path d="M170 336 H300" marker-end="url(#arrow)"/>
    <path d="M480 96 C540 96 546 216 576 216" marker-end="url(#arrow)"/>
    <path d="M480 216 H576" marker-end="url(#arrow)"/>
    <path d="M480 336 C540 336 546 216 576 216" marker-end="url(#arrow)"/>
    <path d="M716 216 H780" marker-end="url(#arrow)"/>
    <path d="M900 216 C924 216 928 96 946 96" marker-end="url(#arrow)"/>
    <path d="M900 216 H946" marker-end="url(#arrow)"/>
    <path d="M900 216 C924 216 928 336 946 336" marker-end="url(#arrow)"/>
    <path d="M390 371 V424" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  </g>
  <g fill="#6b6b80" font-size="11" font-family="ui-monospace, Menlo, monospace">
    <text x="235" y="208" text-anchor="middle">stdio</text>
    <text x="528" y="150" text-anchor="middle">ws · :8765</text>
    <text x="404" y="404" text-anchor="start">node:sqlite</text>
  </g>

  <!-- shared-server group -->
  <rect x="288" y="61" width="204" height="310" rx="16" fill="none" stroke="#d9d9e6" stroke-width="1.5" stroke-dasharray="5 6"/>

  <!-- SQLite cylinder -->
  <path d="M295 432 L295 490 A95 12 0 0 0 485 490 L485 432" fill="rgba(90,94,234,0.10)" stroke="#5A5EEA" stroke-width="1.5"/>
  <ellipse cx="390" cy="432" rx="95" ry="12" fill="rgba(90,94,234,0.16)" stroke="#5A5EEA" stroke-width="1.5"/>
  <text x="390" y="462" text-anchor="middle" fill="#16161d" font-size="14" font-weight="600">SQLite library</text>
  <text x="390" y="480" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">library.db · WAL</text>

  <!-- client nodes -->
  <g>
    <rect x="60" y="73" width="110" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="60" y="193" width="110" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="60" y="313" width="110" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  </g>
  <g fill="#16161d" font-size="14" font-weight="600" text-anchor="middle">
    <text x="115" y="94">Agent A</text>
    <text x="115" y="214">Agent B</text>
    <text x="115" y="334">Agent C</text>
  </g>
  <g fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="115" y="110">session</text>
    <text x="115" y="230">session</text>
    <text x="115" y="350">session</text>
  </g>

  <!-- server nodes -->
  <g>
    <rect x="300" y="73" width="180" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="300" y="193" width="180" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="300" y="313" width="180" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  </g>
  <g fill="#16161d" font-size="14" font-weight="600" text-anchor="middle">
    <text x="390" y="94">playback-mcp</text>
    <text x="390" y="214">playback-mcp</text>
    <text x="390" y="334">playback-mcp</text>
  </g>
  <g fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="390" y="110">sessionId A</text>
    <text x="390" y="230">sessionId B</text>
    <text x="390" y="350">sessionId C</text>
  </g>

  <!-- broker -->
  <rect x="576" y="184" width="140" height="64" rx="13" fill="url(#brokerGrad)"/>
  <text x="646" y="212" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">broker</text>
  <text x="646" y="230" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="11" font-family="ui-monospace, Menlo, monospace">127.0.0.1:8765</text>

  <!-- extension -->
  <rect x="780" y="190" width="120" height="52" rx="12" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  <text x="840" y="212" text-anchor="middle" fill="#16161d" font-size="14" font-weight="600">extension</text>
  <text x="840" y="228" text-anchor="middle" fill="#5b5b6b" font-size="11" font-family="ui-monospace, Menlo, monospace">service worker</text>

  <!-- tabs -->
  <g>
    <rect x="946" y="73" width="58" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="946" y="193" width="58" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
    <rect x="946" y="313" width="58" height="46" rx="11" fill="#ffffff" stroke="#d9d9e6" stroke-width="1.5"/>
  </g>
  <g fill="#16161d" font-size="14" font-weight="600" text-anchor="middle">
    <text x="975" y="94">tab A</text>
    <text x="975" y="214">tab B</text>
    <text x="975" y="334">tab C</text>
  </g>
  <g fill="#FF5A52">
    <circle cx="975" cy="108" r="4"/>
    <circle cx="975" cy="228" r="4"/>
    <circle cx="975" cy="348" r="4"/>
  </g>

  <text x="520" y="545" text-anchor="middle" fill="#6b6b80" font-size="11" font-family="ui-monospace, Menlo, monospace">one broker owns the port · routed by sessionId · one shared SQLite library on disk</text>
</svg>
