version: 2
updates:
  # Keep the SHA-pinned actions in .github/workflows current.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

  # Node deps via the pnpm workspace. A single root pnpm-lock.yaml covers both
  # workspaces (server + extension), so one entry at "/" updates the whole tree.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
