name: Publish

# On a published GitHub Release this (1) publishes the `playback-mcp` server to npm
# and (2) builds the Chrome extension and attaches it as a `.zip` release asset.
# Bump server/package.json's version and tag the release (vX.Y.Z) first; see
# CONTRIBUTING / the release notes for the manual bump + tag flow.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # required for npm provenance (--provenance)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Installs the pnpm version pinned in package.json's "packageManager".
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # Node 24 only: the server uses the built-in node:sqlite (engines: >=23.4).
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (Vitest)
        run: pnpm test

      # prepack (in the server workspace) rebuilds dist/ and copies the root
      # README + LICENSE into the package before the tarball is created.
      # --no-git-checks: the release checkout is a detached HEAD at the tag, and
      # prepack dirties the tree (copied README/LICENSE), so pnpm's branch/clean
      # checks would fail here.
      - name: Publish to npm
        run: pnpm --filter playback-mcp publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Builds extension/dist and attaches it to the release as a load-unpacked zip.
  # Skipped on workflow_dispatch (no release to attach to). Note: the bundle bakes
  # in YT_BRIDGE_PORT at build time (default 8765) — custom ports need a local build.
  package-extension:
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: write # upload the zip as a release asset
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @playback-mcp/extension run build

      - name: Zip extension
        run: (cd extension/dist && zip -r "../../playback-mcp-extension-${{ github.event.release.tag_name }}.zip" .)

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "playback-mcp-extension-${{ github.event.release.tag_name }}.zip" --clobber
