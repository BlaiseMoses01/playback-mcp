name: Publish

# Publishes the `playback-mcp` server to npm when a GitHub Release is published.
# Bump server/package.json's version and tag the release (vX.Y.Z) first; see
# CONTRIBUTING / the release notes for the manual bump + tag flow.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Node 24 only: the server uses the built-in node:sqlite (engines: >=23.4).
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test (Vitest)
        run: npm test

      # prepack (in the server workspace) rebuilds dist/ and copies the root
      # README + LICENSE into the package before the tarball is created.
      - name: Publish to npm
        run: npm publish --workspace server --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
